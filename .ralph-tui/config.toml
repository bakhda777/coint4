configVersion = "2.1"
maxIterations = 10
iterationDelay = 0
outputDir = ".ralph-tui/iterations"
agent = "codex"
tracker = "json"
prompt_template = "./.ralph-tui/templates/json.hbs"
progressFile = ".ralph-tui/progress.md"
autoCommit = false
subagentTracingDetail = "minimal"

[agentOptions]
fullAuto = true
sandbox = "workspace-write"

[trackerOptions]
path = ".ralph-tui/prd.json"

[parallel]
mode = "never"
