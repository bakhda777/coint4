# Project-local Ralph TUI configuration.

agent = "codex"
tracker = "json"
prompt_template = "./.ralph-tui/templates/json.hbs"

# Loop settings (0 = unlimited iterations)
maxIterations = 0
iterationDelay = 0
outputDir = ".ralph-tui/iterations"
progressFile = ".ralph-tui/progress.md"

# Let the agent create meaningful commits with correct messages.
autoCommit = false

[agentOptions]
fullAuto = true
sandbox = "workspace-write"

[trackerOptions]
path = ".ralph-tui/prd.json"

[parallel]
mode = "never"
