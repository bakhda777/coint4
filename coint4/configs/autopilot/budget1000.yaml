# Budget $1000 autopilot config (coordinate-ascent micro-sweeps)
#
# This file is intended to be small, tracked, and easy to tweak.
# Heavy results are written under artifacts/wfa/runs_clean/** (do not commit).

# Base config that defines the full strategy; autopilot only sweeps keys from `search.knobs`.
base_config: configs/prod_final_budget1000.yaml

# Multi-window evaluation (paired start/end; used as `_oosYYYYMMDD_YYYYMMDD` tags).
windows:
  - ["2022-06-01", "2023-04-30"]
  - ["2023-10-01", "2024-09-30"]
  - ["2024-05-01", "2025-06-30"]

# Naming: each sweep becomes its own run_group:
#   <run_group_prefix>_r<round>_<knob>
run_group_prefix: "20260215_budget1000_ap"

# Controller state is kept under artifacts/wfa/aggregate/<controller_group>/state.json
controller_group: "20260215_budget1000_ap_autopilot"

# Where to write generated configs/queues/runs (all paths are app-root relative).
configs_dir: "configs/budget1000_autopilot"
queue_dir: "artifacts/wfa/aggregate"
runs_dir: "artifacts/wfa/runs_clean"

execution:
  # Heavy execution only on VPS 85.198.90.128 through scripts/remote/run_server_job.sh
  sync_up: true
  stop_after: true
  bar_minutes: 15
  overwrite_canonical: true

git:
  # Required for SYNC_UP=1: sync_to_vps.py uploads only tracked files (git ls-files).
  # Autopilot will `git add` generated queue/config/state files (but never runs_clean).
  auto_stage: true

selection:
  min_windows: 3
  min_trades: 10
  min_pairs: 1

  # Statistical confidence gates for robust Sharpe (optional).
  # min_psr: 0.90
  # min_dsr: 0.0
  min_psr: null
  min_dsr: null

  # Option A (hard gate): enable max_dd_pct (set null to disable).
  # max_dd_pct: 0.15
  max_dd_pct: null

  # Option B (soft balance): dd penalty on score.
  # score = worst_robust_sharpe - dd_penalty * max(0, worst_dd_pct - dd_target_pct)
  dd_target_pct: 0.15
  dd_penalty: 5.0

search:
  max_rounds: 3
  # Stop when there is no >=min_improvement gain for N rounds in a row.
  no_improvement_rounds: 1
  min_improvement: 0.02

  # Each knob is a small sweep around the current best value.
  # candidates are multipliers for step: value = current + i*step (op=add) or current*(1+i*step) (op=mul)
  knobs:
    - key: "portfolio.risk_per_position_pct"
      op: "add"
      step: 0.002
      candidates: [-2, -1, 0, 1, 2]
      min: 0.004
      max: 0.03

    - key: "backtest.pair_stop_loss_usd"
      op: "add"
      step: 0.5
      candidates: [-4, -2, 0, 2, 4]
      min: 0.5
      max: 20.0

    - key: "backtest.max_var_multiplier"
      op: "add"
      step: 0.002
      candidates: [-2, -1, 0, 1, 2]
      min: 1.0
      max: 1.05
